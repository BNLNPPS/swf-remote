# epic-devcloud.org — ePIC PanDA monitoring frontend

# WSGI daemon defined once, outside VirtualHost blocks
WSGIDaemonProcess swf-remote python-home=/var/www/swf-remote/.venv python-path=/var/www/swf-remote/src processes=2 threads=15 display-name=swf-remote locale=en_US.UTF-8

<VirtualHost *:80>
    ServerName epic-devcloud.org
    ServerAdmin wenaus@gmail.com
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName epic-devcloud.org
    ServerAdmin wenaus@gmail.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/epic-devcloud.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/epic-devcloud.org/privkey.pem

    Alias /static/ /var/www/swf-remote/staticfiles/
    <Directory /var/www/swf-remote/staticfiles>
        Require all granted
    </Directory>

    WSGIProcessGroup swf-remote
    WSGIScriptAlias / /var/www/swf-remote/src/swf_remote_project/wsgi.py

    <Directory /var/www/swf-remote/src/swf_remote_project>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    WSGIPassAuthorization On

    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"

    ErrorLog ${APACHE_LOG_DIR}/epic-devcloud_error.log
    CustomLog ${APACHE_LOG_DIR}/epic-devcloud_access.log combined
</VirtualHost>
