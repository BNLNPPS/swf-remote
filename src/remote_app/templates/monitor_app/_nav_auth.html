<div class="nav-auth">
    {% if user.is_authenticated %}
        {% if user.is_staff %}<a href="{% url 'admin:index' %}">Admin</a>{% endif %}
        <a href="{% url 'monitor_app:account' %}">{{ user.username }}</a>
        <form method="post" action="{% url 'logout' %}" style="display:inline;margin:0;">{% csrf_token %}<button type="submit" style="background:none;border:none;color:inherit;cursor:pointer;padding:0;font:inherit;">Logout</button></form>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
    {% endif %}
</div>
