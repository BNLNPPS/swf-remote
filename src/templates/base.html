{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ePIC Production Monitor{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
      nav { display: flex; align-items: center; gap: 1em; padding: 0.5em 1em; }
      .nav-spacer { flex: 1 1 auto; }
      .nav-auth { display: flex; gap: 1em; align-items: center; }
      nav a { color: #ADD8E6; text-decoration: none; }
      nav a:hover { text-decoration: underline; }
      nav { background: #222; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'monitor_app:home' %}"><strong>ePIC Production Monitor</strong></a>
        <span class="nav-spacer"></span>
        <a href="{% url 'monitor_app:about' %}">About</a>
        {% include 'monitor_app/_nav_auth.html' %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
