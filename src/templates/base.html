{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ePIC Production Monitor{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
      .nav-spacer { flex: 1 1 auto; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'monitor_app:home' %}">Home</a>
        <a href="{% url 'monitor_app:panda_hub' %}">PanDA</a>
        <a href="{% url 'monitor_app:panda_activity' %}">Activity</a>
        <a href="{% url 'monitor_app:panda_jobs_list' %}">Jobs</a>
        <a href="{% url 'monitor_app:panda_tasks_list' %}">Tasks</a>
        <a href="{% url 'monitor_app:panda_errors_list' %}">Errors</a>
        <a href="{% url 'monitor_app:panda_diagnostics_list' %}">Diagnostics</a>
        <span style="color:#555;">|</span>
        <a href="{% url 'monitor_app:pcs_hub' %}">PCS</a>
        <span class="nav-spacer"></span>
    </nav>
    <main>
        {% if messages %}
            <div class="w-100" style="background-color: #e9ecef; border-bottom: 1px solid #dee2e6; padding: 20px;">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags|default:'info' }} mb-0" role="alert">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
